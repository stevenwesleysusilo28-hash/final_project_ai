{% extends "base.html" %}

{% block title %}Add Child Record - Malnutrition Monitoring System{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Add Child Record</h2>
    <form id="addRecordForm">
        <div class="form-group">
            <label for="name">Child's Name *</label>
            <input type="text" id="name" name="name" required placeholder="Enter child's name">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="age_months">Age (in months) *</label>
                <input type="number" id="age_months" name="age_months" required min="0" max="240" placeholder="e.g., 24">
                <small>0 - 240 months (0 - 20 years)</small>
            </div>

            <div class="form-group">
                <label for="weight_kg">Weight (kg) *</label>
                <input type="number" id="weight_kg" name="weight_kg" required min="0" step="0.1" placeholder="e.g., 15.5">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="height_cm">Height (cm) *</label>
                <input type="number" id="height_cm" name="height_cm" required min="0" step="0.1" placeholder="e.g., 110">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Add Record</button>
        <button type="reset" class="btn btn-secondary">Clear</button>
    </form>

    <div id="result" class="result-section" style="display: none;">
        <h3>Assessment Result</h3>
        <div class="result-card">
            <p><strong>Name:</strong> <span id="resultName"></span></p>
            <p><strong>Age:</strong> <span id="resultAge"></span> months</p>
            <p><strong>Weight:</strong> <span id="resultWeight"></span> kg</p>
            <p><strong>Height:</strong> <span id="resultHeight"></span> cm</p>
            <p><strong>BMI:</strong> <span id="resultBMI"></span></p>
            <p class="status-result"><strong>Status:</strong> <span id="resultStatus"></span></p>
        </div>
        <button class="btn btn-secondary" onclick="location.reload()">Add Another Record</button>
        <a href="/dashboard" class="btn btn-primary">View All Records</a>
    </div>

    <div id="error" class="error-message" style="display: none;"></div>
</div>

<script>
    document.getElementById('addRecordForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
            name: document.getElementById('name').value,
            age_months: document.getElementById('age_months').value,
            weight_kg: document.getElementById('weight_kg').value,
            height_cm: document.getElementById('height_cm').value
        };

        try {
            const response = await fetch('/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('addRecordForm').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                
                const record = data.data;
                document.getElementById('resultName').textContent = record.name;
                document.getElementById('resultAge').textContent = record.age_months;
                document.getElementById('resultWeight').textContent = record.weight_kg;
                document.getElementById('resultHeight').textContent = record.height_cm;
                document.getElementById('resultBMI').textContent = record.bmi;
                document.getElementById('resultStatus').textContent = record.status;
                
                // Color status based on result
                const statusElement = document.getElementById('resultStatus').parentElement;
                statusElement.classList.add('status-' + record.status.toLowerCase().replace(/\s+/g, '-'));
                
                document.getElementById('result').style.display = 'block';
            } else {
                showError('Failed to add record: ' + data.message);
            }
        } catch (error) {
            showError('Error: ' + error.message);
        }
    });

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }
</script>
{% endblock %}
