{% extends "base.html" %}

{% block title %}BMI Calculator - Malnutrition Monitoring System{% endblock %}

{% block content %}
<div class="calculator-container">
    <h2>Quick BMI Calculator</h2>
    <p class="subtitle">Calculate BMI without saving to database</p>

    <div class="calculator-form">
        <div class="form-group">
            <label for="calc_weight">Weight (kg)</label>
            <input type="number" id="calc_weight" min="0" step="0.1" placeholder="e.g., 15.5">
        </div>

        <div class="form-group">
            <label for="calc_height">Height (cm)</label>
            <input type="number" id="calc_height" min="0" step="0.1" placeholder="e.g., 110">
        </div>

        <div class="form-group">
            <label for="calc_age">Age (months)</label>
            <input type="number" id="calc_age" min="0" max="240" placeholder="e.g., 24">
        </div>

        <button class="btn btn-primary" onclick="calculateBMI()">Calculate</button>
    </div>

    <div id="calcResult" class="result-section" style="display: none;">
        <h3>Results</h3>
        <div class="result-card">
            <p><strong>BMI:</strong> <span id="calcBMI"></span></p>
            <p><strong>Nutritional Status:</strong> <span id="calcStatus" class="status-badge"></span></p>
            <p id="calcRecommendation" class="recommendation"></p>
        </div>
    </div>
</div>

<script>
    function calculateBMI() {
        const weight = parseFloat(document.getElementById('calc_weight').value);
        const height = parseFloat(document.getElementById('calc_height').value);
        const age = parseInt(document.getElementById('calc_age').value);

        if (!weight || !height || !age) {
            alert('Please fill in all fields');
            return;
        }

        const heightM = height / 100;
        const bmi = weight / (heightM * heightM);
        let status, recommendation;

        if (age < 24) {
            if (bmi < 13) {
                status = 'Severely Underweight';
                recommendation = '🚨 Urgent intervention needed. Consult healthcare provider immediately.';
            } else if (bmi < 14.5) {
                status = 'Underweight';
                recommendation = '⚠️ Monitor nutrition closely. Consider dietary improvements.';
            } else if (bmi <= 16.5) {
                status = 'Normal';
                recommendation = '✅ Healthy nutritional status. Maintain current diet and exercise.';
            } else {
                status = 'Overweight';
                recommendation = '⚠️ Monitor diet and physical activity levels.';
            }
        } else {
            if (bmi < 14) {
                status = 'Severely Underweight';
                recommendation = '🚨 Urgent intervention needed. Consult healthcare provider immediately.';
            } else if (bmi < 16) {
                status = 'Underweight';
                recommendation = '⚠️ Monitor nutrition closely. Consider dietary improvements.';
            } else if (bmi <= 21) {
                status = 'Normal';
                recommendation = '✅ Healthy nutritional status. Maintain current diet and exercise.';
            } else if (bmi <= 24) {
                status = 'Overweight';
                recommendation = '⚠️ Monitor diet and increase physical activity.';
            } else {
                status = 'Obese';
                recommendation = '🚨 Medical consultation recommended. Develop healthy lifestyle plan.';
            }
        }

        document.getElementById('calcBMI').textContent = bmi.toFixed(2);
        document.getElementById('calcStatus').textContent = status;
        document.getElementById('calcStatus').className = 'status-badge status-' + status.toLowerCase().replace(/\s+/g, '-');
        document.getElementById('calcRecommendation').textContent = recommendation;
        document.getElementById('calcResult').style.display = 'block';
    }

    // Allow Enter key to calculate
    document.getElementById('calc_height').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') calculateBMI();
    });
    document.getElementById('calc_age').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') calculateBMI();
    });
</script>
{% endblock %}
